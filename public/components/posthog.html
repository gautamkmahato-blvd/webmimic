<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PostHog Buttons</title>
<style>
  :root {
    --orange: #eb9d2a;           /* shadow / accent layer */
    --button-border: #1d1f27;    /* near-black border */
    --text-primary: #1d1f27;
    --bg-white: #ffffff;
    --page-bg: #eeefe9;          /* soft beige like the screenshot */
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--page-bg);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
  }

  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    flex-wrap: wrap;
  }

  /* ========== Stacked button (PostHog style) ========== */
  /* The outer element is the "shadow" layer (orange).
     The inner <span> is the button face that sits 2px higher,
     revealing the shadow underneath. Hover lifts it higher,
     active presses it down. */

  .ph-btn {
    /* outer = shadow layer */
    position: relative;
    top: 2px;                         /* pushes the whole stack down so the face lines up */
    display: inline-block;
    padding: 0;
    border: 1.5px solid var(--button-border);
    border-radius: 6px;
    background-color: var(--orange);
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  .ph-btn:focus-visible {
    outline: 2px solid #0074e8;
    outline-offset: 3px;
  }

  .ph-btn__face {
    /* inner = the visible button face */
    display: block;
    position: relative;
    transform: translateY(-2px);      /* lift the face off the shadow */
    margin: 0 -1.5px;                 /* align borders with outer layer */
    border: 1.5px solid var(--button-border);
    border-radius: 6px;
    padding: 4px 16px;                /* py-1 px-4 */
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    text-align: center;
    color: var(--text-primary);
    user-select: none;
    transition: transform 120ms ease;
  }

  /* Hover: lift the face an extra 2px (reveals more shadow) */
  .ph-btn:hover .ph-btn__face {
    transform: translateY(-4px);
  }

  /* Active: press the face down to almost flush */
  .ph-btn:active .ph-btn__face {
    transform: translateY(-1px);
    transition-duration: 100ms;
  }

  /* ---- Variant A: filled (orange face) ---- */
  .ph-btn--primary .ph-btn__face {
    background-color: var(--orange);
  }

  /* ---- Variant B: outlined (white face, orange shadow) ---- */
  .ph-btn--secondary .ph-btn__face {
    background-color: var(--bg-white);
  }
</style>
</head>
<body>
  <div class="stage">

    <!-- Primary / filled button -->
    <a
      href="#"
      class="ph-btn ph-btn--primary"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="ph-btn__face">Get started - free</span>
    </a>

    <!-- Secondary / outlined button -->
    <button type="button" class="ph-btn ph-btn--secondary">
      <span class="ph-btn__face">Install with AI</span>
    </button>

  </div>
</body>
</html>
