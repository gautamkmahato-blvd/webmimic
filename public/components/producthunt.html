<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Product Hunt Components</title>
<style>
  /* ---------- Product Hunt design tokens ---------- */
  :root {
    --brand-500: #ff6154;          /* Product Hunt coral/orange */
    --brand-600: #e84b3e;
    --brand-700: #c43e33;

    --gray-50:  #f9fafb;
    --gray-100: #f2f4f7;
    --gray-200: #eaecf0;
    --gray-300: #d0d5dd;
    --gray-500: #667085;
    --gray-600: #475467;
    --gray-700: #344054;
    --gray-900: #101828;

    --warning-100: #fef0c7;        /* soft yellow border used in banner */
    --orangeDark-50: #fff3ed;      /* peachy banner background */

    --text-primary: #101828;
    --text-secondary: #475467;
    --light-gray: #98a2b3;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }

  .component-block {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .component-label {
    font-size: 12px;
    color: var(--gray-500);
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  /* ============================================= */
  /* Component 1: Subscribe / Sign in header buttons */
  /* ============================================= */
  .nav-actions {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-end;
    gap: 16px;
  }

  .btn-base {
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 40px;
    padding: 0 16px;
    border-radius: 9999px;
    font-size: 16px;
    font-weight: 600;
    line-height: 1;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: all 200ms ease;
    white-space: nowrap;
  }

  /* Subscribe (outlined) */
  .btn-subscribe {
    background: #ffffff;
    color: var(--text-secondary);
    border: 2px solid var(--gray-200);
  }
  .btn-subscribe:hover {
    border-color: var(--gray-300);
    background: var(--gray-50);
  }
  .btn-subscribe svg {
    width: 16px;
    height: 16px;
    stroke: var(--gray-700);
  }

  /* Sign in (filled brand) */
  .btn-signin {
    background: var(--brand-500);
    color: #ffffff;
    border: none;
  }
  .btn-signin:hover {
    background: var(--brand-600);
  }
  .btn-signin svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
  }

  /* ============================================= */
  /* Component 2: Post item row (Claude Opus 4.7)    */
  /* ============================================= */
  .post-item {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 16px;
    padding: 16px;
    margin: 0 -16px;
    border-radius: 12px;
    cursor: pointer;
    transition: background-color 300ms ease;
  }
  .post-item:hover {
    background-color: var(--gray-100);
  }

  .post-item__thumb {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #f2efe9;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Claude "A" logo mark */
  .claude-logo {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Times New Roman", serif;
    font-size: 26px;
    font-weight: 700;
    color: #1d1d1d;
    letter-spacing: -1px;
  }
  .claude-logo span:last-child {
    margin-left: -2px;
    font-size: 22px;
  }

  .post-item__body {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex: 1;
  }

  .post-item__title {
    display: inline-flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px 8px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    transition: color 300ms ease;
  }
  .post-item__title a {
    color: inherit;
    text-decoration: none;
  }
  .post-item:hover .post-item__title {
    color: var(--brand-500);
  }

  .post-item__title-link-icon {
    width: 14px;
    height: 14px;
    color: var(--gray-500);
    display: none;
    transition: color 200ms ease;
  }
  .post-item:hover .post-item__title-link-icon {
    display: inline-block;
    color: var(--brand-500);
  }

  .post-item__desc {
    margin-top: 2px;
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .post-item__tags {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 14px;
  }
  .post-item__tags svg {
    width: 14px;
    height: 14px;
    stroke: var(--gray-500);
    flex-shrink: 0;
  }
  .post-item__tags a {
    color: var(--text-primary);
    text-decoration: none;
    font-size: 14px;
  }
  .post-item__tags a:hover {
    text-decoration: underline;
  }
  .post-item__tag-dot {
    color: var(--light-gray);
    font-size: 12px;
    opacity: 0.7;
    position: relative;
    top: -1px;
  }

  /* Square accessory buttons (comments / votes) */
  .post-item__accessories {
    display: flex;
    flex-direction: row;
    gap: 8px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .accessory-btn {
    width: 48px;
    height: 48px;
    background: #ffffff;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    padding: 0;
    transition: border-color 300ms ease;
  }
  .accessory-btn:hover {
    border-color: var(--brand-500);
  }
  .accessory-btn svg {
    width: 14px;
    height: 14px;
    stroke: var(--gray-700);
    fill: none;
  }
  .accessory-btn .vote-triangle {
    fill: #ffffff;
  }
  .accessory-btn__count {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    line-height: 1;
    color: var(--gray-700);
  }

  /* ============================================= */
  /* Component 3: Welcome banner                     */
  /* ============================================= */
  .welcome-banner {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    padding: 16px;
    border-radius: 12px;
    background: var(--orangeDark-50);
    margin-bottom: 24px;
  }

  .welcome-banner__icon {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    border: 2px solid var(--warning-100);
    border-radius: 12px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .welcome-banner__icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--gray-700);
    fill: none;
  }

  .welcome-banner__content {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }

  .welcome-banner__title {
    font-size: 16px;
    font-weight: 600;
    color: var(--gray-900);
  }

  .welcome-banner__desc {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 4px;
    font-size: 16px;
    font-weight: 400;
    color: var(--gray-600);
  }

  .welcome-banner__cta {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-weight: 600;
    color: var(--brand-500);
    cursor: pointer;
    text-align: left;
  }
  .welcome-banner__cta:hover {
    text-decoration: underline;
  }

  .welcome-banner__close {
    margin-left: auto;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    border: 2px solid var(--warning-100);
    border-radius: 9999px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: all 300ms ease;
  }
  .welcome-banner__close:hover {
    border-color: var(--gray-300);
    background: var(--gray-50);
  }
  .welcome-banner__close svg {
    width: 20px;
    height: 20px;
    stroke: var(--gray-600);
  }
</style>
</head>
<body>
  <div class="page">

    <!-- ===== Component 1 ===== -->
    <section class="component-block">
      <div class="component-label">Component 1 — Header nav buttons</div>
      <div class="nav-actions">
        <a href="#" class="btn-base btn-subscribe">
          <!-- envelope icon -->
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.667"
              d="m11.453 2.195 6.274 4.077c.221.144.332.216.412.313a.8.8 0 0 1 .158.289c.036.12.036.252.036.516v6.11c0 1.4 0 2.1-.272 2.635a2.5 2.5 0 0 1-1.093 1.092c-.535.273-1.235.273-2.635.273H5.667c-1.4 0-2.1 0-2.635-.273a2.5 2.5 0 0 1-1.093-1.092c-.272-.535-.272-1.235-.272-2.635V7.39c0-.264 0-.396.036-.516a.8.8 0 0 1 .157-.29c.08-.096.192-.168.413-.312l6.274-4.077m2.906 0c-.526-.342-.789-.513-1.072-.58a1.7 1.7 0 0 0-.762 0c-.283.067-.546.238-1.072.58m2.906 0 5.16 3.354c.574.372.86.559.96.795a.83.83 0 0 1 0 .645c-.1.237-.386.423-.96.796l-5.16 3.354c-.526.342-.789.513-1.072.58a1.7 1.7 0 0 1-.762 0c-.283-.067-.546-.238-1.072-.58l-5.16-3.354c-.574-.373-.86-.56-.96-.796a.83.83 0 0 1 0-.645c.1-.236.386-.423.96-.795l5.16-3.354m9.37 13.638-5.536-5m-4.762 0-5.536 5"
            />
          </svg>
          Subscribe
        </a>
        <button type="button" class="btn-base btn-signin">
          <!-- sign-in (arrow into circle) icon -->
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.667"
              d="M2.782 5.833a8.333 8.333 0 1 1 0 8.333M10 13.334 13.333 10m0 0L10 6.667M13.333 10H1.667"
            />
          </svg>
          Sign in
        </button>
      </div>
    </section>

    <!-- ===== Component 2 ===== -->
    <section class="component-block">
      <div class="component-label">Component 2 — Post row</div>
      <div class="post-item">
        <div class="post-item__thumb">
          <div class="claude-logo">
            <span>A</span><span>|</span>
          </div>
        </div>

        <div class="post-item__body">
          <span class="post-item__title">
            <a href="#">1. Claude Opus 4.7</a>
            <!-- external link icon (appears on hover) -->
            <svg
              class="post-item__title-link-icon"
              viewBox="0 0 14 14"
              fill="none"
              aria-hidden="true"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M12.25 5.25v-3.5m0 0h-3.5m3.5 0L7 7M5.833 1.75H4.55c-.98 0-1.47 0-1.844.19a1.75 1.75 0 0 0-.765.766c-.191.374-.191.864-.191 1.844v4.9c0 .98 0 1.47.19 1.845.169.329.436.597.766.764.374.191.864.191 1.844.191h4.9c.98 0 1.47 0 1.845-.19a1.75 1.75 0 0 0 .764-.766c.191-.374.191-.864.191-1.844V8.167"
              />
            </svg>
          </span>

          <span class="post-item__desc">
            Claude’s most capable model for reasoning and agentic coding
          </span>

          <div class="post-item__tags">
            <!-- tag icon -->
            <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="m12.25 6.417-4.43-4.43c-.303-.303-.454-.454-.63-.562a1.8 1.8 0 0 0-.506-.21c-.202-.048-.416-.048-.844-.048H3.5M1.75 5.075v1.152c0 .285 0 .428.032.562q.044.18.14.337c.072.118.173.219.375.42l4.55 4.55c.462.463.693.694.96.78.233.077.486.077.72 0 .267-.086.498-.317.96-.78l1.443-1.443c.462-.462.693-.693.78-.96a1.17 1.17 0 0 0 0-.72c-.087-.267-.318-.498-.78-.96L6.672 3.755c-.202-.202-.303-.303-.42-.375a1.2 1.2 0 0 0-.338-.14c-.134-.032-.277-.032-.562-.032H3.617c-.654 0-.98 0-1.23.128-.22.111-.398.29-.51.51-.127.249-.127.576-.127 1.229"
              />
            </svg>
            <a href="#">API</a>
            <span class="post-item__tag-dot">•</span>
            <a href="#">Artificial Intelligence</a>
            <span class="post-item__tag-dot">•</span>
            <a href="#">Development</a>
          </div>
        </div>

        <div class="post-item__accessories">
          <button type="button" class="accessory-btn" aria-label="Comments">
            <!-- speech bubble -->
            <svg viewBox="0 0 14 14" aria-hidden="true">
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M12.25 6.708a4.958 4.958 0 0 1-6.74 4.629 2 2 0 0 0-.192-.068.5.5 0 0 0-.11-.014 1.4 1.4 0 0 0-.176.012l-2.987.309c-.285.03-.427.044-.511-.007a.3.3 0 0 1-.137-.204c-.015-.097.053-.223.19-.475l.953-1.766c.079-.146.118-.218.136-.288a.5.5 0 0 0 .016-.19c-.006-.072-.037-.166-.1-.353a4.958 4.958 0 1 1 9.658-1.585"
              />
            </svg>
            <p class="accessory-btn__count">20</p>
          </button>
          <button type="button" class="accessory-btn" aria-label="Upvote">
            <!-- upvote triangle -->
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                class="vote-triangle"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6.579 3.467c.71-1.067 2.132-1.067 2.842 0L12.975 8.8c.878 1.318.043 3.2-1.422 3.2H4.447c-1.464 0-2.3-1.882-1.422-3.2z"
              />
            </svg>
            <p class="accessory-btn__count">451</p>
          </button>
        </div>
      </div>
    </section>

    <!-- ===== Component 3 ===== -->
    <section class="component-block">
      <div class="component-label">Component 3 — Welcome banner</div>
      <section class="welcome-banner">
        <div class="welcome-banner__icon">
          <!-- hand / rock-on style icon from the PH markup -->
          <svg viewBox="0 0 28 28" aria-hidden="true">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M18.136 11.58c.437-.775.8-1.475 1.025-2.007 1.09-2.585.012-5.559-2.621-6.772s-5.278.045-6.438 2.473c-2.22-1.522-5.18-1.299-6.812 1.078s-1.12 5.48 1.116 7.174c1.014.77 3.021 1.902 4.91 2.91m9.697-2.728c-.492-2.646-2.743-4.58-5.578-4.055s-4.668 3.084-4.284 5.862c.307 2.233 2.007 7.471 2.663 9.445.09.269.134.404.223.497a.6.6 0 0 0 .29.168c.125.03.264 0 .542-.056 2.037-.418 7.423-1.566 9.51-2.416 2.599-1.057 3.94-3.921 2.935-6.641s-3.763-3.7-6.3-2.804Z"
            />
          </svg>
        </div>

        <div class="welcome-banner__content">
          <div class="welcome-banner__title">Welcome to Product Hunt!</div>
          <div class="welcome-banner__desc">
            <span>The place to launch and discover new tech products.</span>
            <button type="button" class="welcome-banner__cta">
              Take a tour.
            </button>
          </div>
        </div>

        <button
          type="button"
          class="welcome-banner__close"
          title="close"
          aria-label="Close"
        >
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.667"
              d="M15 5 5 15M5 5l10 10"
            />
          </svg>
        </button>
      </section>
    </section>

  </div>
</body>
</html>
